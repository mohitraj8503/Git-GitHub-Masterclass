# ============================================
# Docker Compose for Git-GitHub Masterclass
# ============================================
# Usage:
#   docker compose up --build        (build & start)
#   docker compose up -d             (detached / background)
#   docker compose down              (stop & remove)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github-masterclass
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
